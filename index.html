<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Weather Forecast App</title>
  <link rel="stylesheet" href="styles.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />
</head>
<body>
  <div class="container">
    <header class="app-header">
      <h1><i class="fas fa-cloud-sun"></i> Weather Forecast</h1>
      <p>Get accurate weather information for any location</p>
    </header>

    <div class="search-container">
      <form class="search-form" id="searchForm">
        <input
          type="text"
          class="search-input"
          id="locationInput"
          placeholder="Enter city name or zip code..."
          required
        />
        <button type="submit" class="search-btn">
          <i class="fas fa-search"></i> Search Weather
        </button>
      </form>
    </div>

    <div id="loading" class="loading hidden">
      <i class="fas fa-spinner fa-spin"></i> Loading weather data...
    </div>

    <div id="error" class="error hidden"></div>

    <div class="weather-container">
      <div class="current-weather hidden" id="currentWeather">
        <div class="weather-header">
          <h2 class="location" id="locationName">--</h2>
          <span class="date" id="currentDate">--</span>
        </div>

        <div class="weather-main">
          <img
            src="https://placehold.co/100x100"
            alt="Weather condition icon showing current atmospheric conditions"
            class="weather-icon"
            id="weatherIcon"
          />
          <div class="temperature" id="temperature">--°C</div>
          <div class="weather-description" id="weatherDescription">--</div>
        </div>

        <div class="weather-details">
          <div class="detail-item">
            <i class="fas fa-temperature-high detail-icon"></i>
            <div>
              <div class="detail-value" id="feelsLike">--°C</div>
              <div class="detail-label">Feels Like</div>
            </div>
          </div>
          <div class="detail-item">
            <i class="fas fa-tint detail-icon"></i>
            <div>
              <div class="detail-value" id="humidity">--%</div>
              <div class="detail-label">Humidity</div>
            </div>
          </div>
          <div class="detail-item">
            <i class="fas fa-wind detail-icon"></i>
            <div>
              <div class="detail-value" id="windSpeed">-- m/s</div>
              <div class="detail-label">Wind Speed</div>
            </div>
          </div>
          <div class="detail-item">
            <i class="fas fa-compress-arrows-alt detail-icon"></i>
            <div>
              <div class="detail-value" id="pressure">-- hPa</div>
              <div class="detail-label">Pressure</div>
            </div>
          </div>
        </div>

        <!-- Clothing Suggestion Box (will be populated dynamically) -->
        <div id="clothingSuggestion" class="hidden"></div>
      </div>

      <div class="forecast hidden" id="forecast">
        <h3 class="forecast-title">5-Day Forecast</h3>
        <div class="forecast-cards" id="forecastCards"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
